<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #F4EFE6;
    color: #1C1B33;
    padding: 20px;
  }
  .hero {
    background: #1C1B33;
    border-radius: 26px;
    padding: 26px 28px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: "";
    position: absolute; top: -30px; right: -30px; width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(255,138,80,0.28) 0%, rgba(255,138,80,0) 70%);
  }
  .hero h1 { font-size: 24px; margin: 0 0 6px 0; color: #FDFBF7; letter-spacing: -0.01em; position: relative; }
  .hero .subtitle { color: #A9A6C4; font-size: 13px; margin: 0; position: relative; }
  h2 { font-size: 15px; margin: 0 0 4px 0; color: #1C1B33; letter-spacing: -0.01em; }
  .eyebrow { text-transform: uppercase; font-size: 10.5px; letter-spacing: .08em; color: #A79B86; font-weight: 700; }
  .net-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 26px;
  }
  .net-card {
    background: #FFFFFF; border-radius: 20px; padding: 18px;
    box-shadow: 0 4px 18px rgba(28,27,51,0.06);
  }
  .net-card.net { background: #1C1B33; }
  .net-card h3 { margin: 0 0 8px 0; font-size: 11px; color: #A79B86; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
  .net-card.net h3 { color: #A9A6C4; }
  .net-card .val { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .net-card.assets .val { color: #2F8F6E; }
  .net-card.debts .val { color: #D0603F; }
  .net-card.net .val { color: #FDFBF7; }
  section { margin-bottom: 28px; }
  section > .hint { font-size: 12px; color: #A79B86; margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
  .card {
    background: #FFFFFF; border-radius: 20px; padding: 18px;
    box-shadow: 0 4px 18px rgba(28,27,51,0.06);
  }
  .card h4 { margin: 0 0 12px 0; font-size: 13.5px; font-weight: 700; color: #1C1B33; }
  .field { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 13px; gap: 10px; }
  .field label { color: #8B8698; }
  .field input {
    border: 1.5px solid #EEE8DC; border-radius: 10px; padding: 5px 10px; font-size: 13px;
    width: 128px; text-align: right; font-family: inherit; background: #FBF9F4; color: #1C1B33; font-weight: 600;
  }
  .field input:focus { outline: none; border-color: #FF8A50; box-shadow: 0 0 0 3px rgba(255,138,80,0.15); }
  .note-badge {
    font-size: 11px; color: #1C1B33; background: #FDEBD9; border-radius: 20px;
    padding: 4px 12px; display: inline-block; margin-top: 8px; font-weight: 600;
  }
  .schedule { display: flex; gap: 12px; flex-wrap: wrap; }
  .schedule .step {
    flex: 1 1 160px; background: #FFFFFF; border-radius: 18px; padding: 14px;
    box-shadow: 0 4px 18px rgba(28,27,51,0.06); border-left: 4px solid #FF8A50;
  }
  .schedule .step .amt { font-size: 19px; font-weight: 800; color: #1C1B33; }
  .schedule .step .date { font-size: 12px; color: #A79B86; margin-top: 2px; }
  .income-card { background: #FFFFFF; border-radius: 20px; padding: 22px; box-shadow: 0 4px 18px rgba(28,27,51,0.06); }
  .income-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .income-row label { font-size: 13px; color: #8B8698; min-width: 170px; font-weight: 600; }
  .bar-bg { background: #F1ECE0; border-radius: 10px; height: 16px; overflow: hidden; flex: 1; position: relative; min-width: 160px; }
  .bar-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg,#FF8A50,#FFB98A); transition: width .3s; }
  .milestones { display: flex; justify-content: space-between; font-size: 11px; color: #A79B86; margin-top: 6px; font-weight: 600; }
  .updated { font-size: 11px; color: #B7AF9C; margin-top: 20px; text-align: right; }

  .tx-card { background: #FFFFFF; border-radius: 20px; padding: 20px; box-shadow: 0 4px 18px rgba(28,27,51,0.06); margin-bottom: 16px; }
  .tx-totals { display: flex; gap: 22px; flex-wrap: wrap; margin-bottom: 16px; }
  .tx-totals div span.lbl { display: block; font-size: 10.5px; text-transform: uppercase; letter-spacing: .06em; color: #A79B86; font-weight: 700; margin-bottom: 2px; }
  .tx-totals div span.v { font-size: 18px; font-weight: 800; }
  .tx-form { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .tx-form .fld { display: flex; flex-direction: column; gap: 4px; font-size: 11.5px; color: #8B8698; font-weight: 600; }
  .tx-form select, .tx-form input {
    border: 1.5px solid #EEE8DC; border-radius: 10px; padding: 7px 10px; font-size: 13px;
    font-family: inherit; background: #FBF9F4; color: #1C1B33; font-weight: 600;
  }
  .tx-form select:focus, .tx-form input:focus { outline: none; border-color: #FF8A50; box-shadow: 0 0 0 3px rgba(255,138,80,0.15); }
  .tx-form input[type="text"] { min-width: 150px; }
  .tx-form button {
    background: #FF8A50; color: #fff; border: none; border-radius: 10px; padding: 9px 18px;
    font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .tx-form button:hover { background: #FF7A38; }
  .tx-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 6px; }
  .tx-table th { text-align: left; color: #A79B86; font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; padding: 6px 8px; border-bottom: 1.5px solid #F1ECE0; }
  .tx-table td { padding: 8px; border-bottom: 1px solid #F4EFE6; }
  .tx-table td.amt-income { color: #2F8F6E; font-weight: 700; text-align: right; }
  .tx-table td.amt-expense { color: #D0603F; font-weight: 700; text-align: right; }
  .tx-del { background: none; border: none; color: #B7AF9C; cursor: pointer; font-size: 14px; }
  .tx-del:hover { color: #D0603F; }
</style>
</head>
<body>

<div class="hero">
  <h1>Деньги</h1>
